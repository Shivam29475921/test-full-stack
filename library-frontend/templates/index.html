{% extends "base.html" %}

{% block content %}
<div class="hero">

    <div class="atom-container">
        <div class="nucleus"></div>

        <div class="electron-orbit">
            <div class="electron"></div>
        </div>
    </div>
    <h1>Library<br>Atomic.</h1>

    <p>
        The fundamental building block of knowledge management. <br>
        Simple, powerful, and energetic.
    </p>



  <br>
  <br>

    <div style="animation: fadeUp 1.4s ease-out;">

            Launch App
        </a>
    </div>
</div>

<div style="display: flex; gap: 30px; margin-top: 20px; justify-content: center; flex-wrap: wrap;">

    </div>

    <div class="card" style="flex: 1; min-width: 280px; text-align: center; border-color: rgba(44, 182, 125, 0.2);">

    </div>
